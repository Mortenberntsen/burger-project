name: Build and Deploy BurgerHouse

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Logg inn på Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bygg og push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./burger-app/frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/burger-frontend:latest

      - name: Bygg og push backend
        uses: docker/build-push-action@v5
        with:
          context: ./burger-app/backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/burger-backend:latest

      - name: Deploy til Kubernetes
        uses: azure/k8s-deploy@v4
        with:
          namespace: burger
          manifests: |
            burger-app/kubernetes/burger-app.yaml
