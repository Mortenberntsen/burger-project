name: Build and Deploy BurgerHouse

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Logg inn på Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bygg og push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./burger-app/frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/burger-frontend:latest

      - name: Bygg og push backend
        uses: docker/build-push-action@v5
        with:
          context: ./burger-app/backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/burger-backend:latest

      - name: Autentiser mot GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Koble til GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: burgerhouse
          location: europe-west1-b

      - name: Deploy til GKE
        run: |
          kubectl rollout restart deployment/frontend -n burger
          kubectl rollout restart deployment/backend -n burger
