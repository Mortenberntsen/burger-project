<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BurgerKing Oslo – Bestill nå</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; }

    header {
      background: linear-gradient(135deg, #d62300, #ff4500);
      padding: 1rem 5%;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 20px rgba(214,35,0,0.5);
    }
    .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
    .logo span { color: #ffd700; }
    .cart-btn {
      background: #ffd700; color: #1a1a1a; border: none;
      padding: 0.6rem 1.4rem; border-radius: 25px; font-weight: 700;
      cursor: pointer; font-size: 1rem; transition: transform 0.1s;
    }
    .cart-btn:hover { transform: scale(1.05); }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                  url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=1400') center/cover;
      padding: 5rem 5%;
      text-align: center;
    }
    .hero h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem; }
    .hero h1 span { color: #ffd700; }
    .hero p { font-size: 1.2rem; color: #ccc; margin-bottom: 2rem; }
    .hero-btn {
      background: #d62300; color: #fff; padding: 1rem 2.5rem;
      border: none; border-radius: 30px; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .hero-btn:hover { background: #ff4500; }

    .menu-section { padding: 3rem 5%; }
    .menu-section h2 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
    .menu-section h2 span { color: #d62300; }
    .subtitle { color: #888; margin-bottom: 2rem; }

    .category-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .tab {
      padding: 0.5rem 1.5rem; border-radius: 25px; border: 2px solid #333;
      background: transparent; color: #ccc; cursor: pointer; font-weight: 600;
      transition: all 0.2s;
    }
    .tab.active { background: #d62300; border-color: #d62300; color: #fff; }

    .menu-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .menu-item {
      background: #2a2a2a; border-radius: 16px; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #333;
    }
    .menu-item:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(214,35,0,0.2); }
    .item-img { width: 100%; height: 180px; object-fit: cover; }
    .item-img-placeholder {
      width: 100%; height: 180px; background: #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
    }
    .item-info { padding: 1.2rem; }
    .item-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .item-desc { color: #888; font-size: 0.85rem; margin-bottom: 1rem; line-height: 1.5; }
    .item-footer { display: flex; justify-content: space-between; align-items: center; }
    .item-price { font-size: 1.3rem; font-weight: 800; color: #ffd700; }
    .add-btn {
      background: #d62300; color: #fff; border: none;
      width: 36px; height: 36px; border-radius: 50%; font-size: 1.4rem;
      cursor: pointer; transition: background 0.2s; display: flex;
      align-items: center; justify-content: center;
    }
    .add-btn:hover { background: #ff4500; }

    /* Cart sidebar */
    .cart-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
    }
    .cart-overlay.open { display: block; }
    .cart-sidebar {
      position: fixed; right: -420px; top: 0; width: 420px; height: 100%;
      background: #1a1a1a; z-index: 201; transition: right 0.3s;
      display: flex; flex-direction: column;
      border-left: 1px solid #333;
    }
    .cart-sidebar.open { right: 0; }
    .cart-header {
      padding: 1.5rem; border-bottom: 1px solid #333;
      display: flex; justify-content: space-between; align-items: center;
    }
    .cart-header h3 { font-size: 1.3rem; font-weight: 700; }
    .close-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-empty { text-align: center; padding: 3rem; color: #555; font-size: 1rem; }
    .cart-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem; background: #2a2a2a; border-radius: 10px; margin-bottom: 0.8rem;
    }
    .cart-item-name { font-weight: 600; font-size: 0.95rem; }
    .cart-item-price { color: #ffd700; font-weight: 700; }
    .cart-item-qty { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn {
      background: #333; border: none; color: #fff; width: 26px; height: 26px;
      border-radius: 50%; cursor: pointer; font-size: 1rem;
    }
    .cart-footer { padding: 1.5rem; border-top: 1px solid #333; }
    .cart-total { display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 1.2rem; font-weight: 700; }
    .cart-total span:last-child { color: #ffd700; }

    /* Order form */
    .order-form { padding: 0 1.5rem 1rem; }
    .order-form h4 { margin-bottom: 1rem; color: #ccc; }
    .order-form input {
      width: 100%; padding: 0.7rem 1rem; background: #2a2a2a;
      border: 1px solid #444; border-radius: 8px; color: #fff;
      margin-bottom: 0.8rem; font-size: 0.95rem;
    }
    .checkout-btn {
      width: 100%; background: #d62300; color: #fff; border: none;
      padding: 1rem; border-radius: 10px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .checkout-btn:hover { background: #ff4500; }

    /* Orders section */
    .orders-section { padding: 3rem 5%; background: #111; }
    .orders-section h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 1.5rem; }
    .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .order-card {
      background: #2a2a2a; border-radius: 12px; padding: 1.2rem;
      border-left: 4px solid #d62300;
    }
    .order-card-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; }
    .order-id { font-weight: 700; color: #ffd700; }
    .order-status {
      background: #1a4a1a; color: #4caf50; padding: 0.2rem 0.8rem;
      border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    }
    .order-customer { color: #ccc; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .order-items { color: #888; font-size: 0.85rem; margin-bottom: 0.8rem; }
    .order-total { font-weight: 700; color: #ffd700; }

    footer {
      background: #111; border-top: 1px solid #222;
      text-align: center; padding: 2rem; color: #555;
    }

    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #d62300; color: #fff; padding: 0.8rem 2rem;
      border-radius: 25px; font-weight: 600; z-index: 300;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo">Burger<span>House</span></div>
  <div style="display:flex;gap:0.8rem;align-items:center">
    <a href="/admin.html" style="background:#333;color:#ffd700;padding:0.6rem 1.2rem;border-radius:25px;font-weight:700;text-decoration:none;font-size:0.9rem;">Admin</a>
    <button class="cart-btn" onclick="openCart()">🛒 Handlekurv (<span id="cart-count">0</span>)</button>
  </div>
</header>

<section class="hero">
  <h1>Norges beste<br><span>burgere</span></h1>
  <p>Ferskt kjøtt, sprøtt bacon, hjemmelagde sauser</p>
  <button class="hero-btn" onclick="document.querySelector('.menu-section').scrollIntoView({behavior:'smooth'})">Se menyen</button>
</section>

<section class="menu-section">
  <h2>Vår <span>meny</span></h2>
  <p class="subtitle">Håndlaget med norske råvarer</p>
  <div class="category-tabs">
    <button class="tab active" onclick="filterMenu('alle', this)">Alle</button>
    <button class="tab" onclick="filterMenu('burger', this)">Burgere</button>
    <button class="tab" onclick="filterMenu('sider', this)">Tilbehør</button>
    <button class="tab" onclick="filterMenu('drikke', this)">Drikke</button>
  </div>
  <div class="menu-grid" id="menu-grid"></div>
</section>

<section class="orders-section">
  <h2>📋 Siste bestillinger</h2>
  <div class="orders-grid" id="orders-grid"><p style="color:#555">Ingen bestillinger ennå.</p></div>
</section>

<footer>
  <p>BurgerHouse Oslo © 2026 — Bygget med Kubernetes 🚀</p>
</footer>

<!-- Cart sidebar -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h3>🛒 Din handlekurv</h3>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items">
    <div class="cart-empty">Handlekurven er tom</div>
  </div>
  <div class="order-form">
    <h4>Dine opplysninger</h4>
    <input type="text" id="customer-name" placeholder="Navn" />
    <input type="text" id="customer-phone" placeholder="Telefon" />
    <input type="text" id="customer-address" placeholder="Adresse" />
  </div>
  <div class="cart-footer">
    <div class="cart-total"><span>Totalt:</span><span id="cart-total">0 kr</span></div>
    <button class="checkout-btn" onclick="placeOrder()">Bestill nå 🍔</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if (window.location.hostname === 'bestillinger.local') {
  window.location.replace('/bestillinger.html');
}
const API = '/api';

const menuItems = [
  { id: 1, name: 'Classic Burger', desc: 'Saftig storfeburger, cheddar, salat, tomat og hjemmelaget dressing', price: 149, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&q=80', category: 'burger' },
  { id: 2, name: 'Bacon Double', desc: 'Dobbel burger med sprøtt bacon og karamellisert løk', price: 189, img: 'https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=400&q=80', category: 'burger' },
  { id: 3, name: 'Crispy Chicken', desc: 'Sprø kyllingburger med coleslaw og jalapeño mayo', price: 159, img: 'https://images.unsplash.com/photo-1606755962773-d324e0a13086?w=400&q=80', category: 'burger' },
  { id: 4, name: 'Veggie Deluxe', desc: 'Plantebasert burger med avokado og grillet paprika', price: 145, img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=400&q=80', category: 'burger' },
  { id: 5, name: 'BBQ Smokehouse', desc: 'Røkt burger med BBQ-saus, crispy onion rings og cheddar', price: 179, img: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=400&q=80', category: 'burger' },
  { id: 6, name: 'Truffle Mushroom', desc: 'Gourmetburger med trøffelsopp, gruyère og rucola', price: 199, img: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=400&q=80', category: 'burger' },
  { id: 7, name: 'Pommes Frites', desc: 'Sprø pommes frites med havsalt', price: 49, img: 'https://images.unsplash.com/photo-1576107232684-1279f390859f?w=400&q=80', category: 'sider' },
  { id: 8, name: 'Onion Rings', desc: '8 stk crispy onion rings med dip', price: 59, img: 'https://images.unsplash.com/photo-1639024471283-03518883512d?w=400&q=80', category: 'sider' },
  { id: 9, name: 'Coleslaw', desc: 'Hjemmelaget coleslaw med kål og gulrot', price: 39, img: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=80', category: 'sider' },
  { id: 10, name: 'Cola', desc: 'Coca-Cola 0.5L', price: 35, img: 'https://images.unsplash.com/photo-1629203851122-3726ecdf080e?w=400&q=80', category: 'drikke' },
  { id: 11, name: 'Milkshake', desc: 'Hjemmelaget milkshake — vanilje, sjokolade eller jordbær', price: 69, img: 'https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=400&q=80', category: 'drikke' },
  { id: 12, name: 'Juice', desc: 'Ferskpresset appelsinjuice', price: 45, img: 'https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=400&q=80', category: 'drikke' },
];

let cart = [];
let currentCategory = 'alle';

function filterMenu(category, btn) {
  currentCategory = category;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const grid = document.getElementById('menu-grid');
  const filtered = currentCategory === 'alle' ? menuItems : menuItems.filter(i => i.category === currentCategory);
  grid.innerHTML = filtered.map(item => `
    <div class="menu-item">
      <img class="item-img" src="${item.img}" alt="${item.name}" loading="lazy">
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-footer">
          <div class="item-price">${item.price} kr</div>
          <button class="add-btn" onclick="addToCart(${item.id})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function addToCart(id) {
  const item = menuItems.find(i => i.id === id);
  const existing = cart.find(i => i.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...item, qty: 1 });
  updateCartUI();
  showToast(`${item.emoji} ${item.name} lagt til!`);
}

function removeFromCart(id) {
  const existing = cart.find(i => i.id === id);
  if (existing.qty > 1) existing.qty--;
  else cart = cart.filter(i => i.id !== id);
  updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
  document.getElementById('cart-count').textContent = cart.reduce((sum, i) => sum + i.qty, 0);
  document.getElementById('cart-total').textContent = total + ' kr';
  const itemsEl = document.getElementById('cart-items');
  if (cart.length === 0) {
    itemsEl.innerHTML = '<div class="cart-empty">Handlekurven er tom</div>';
    return;
  }
  itemsEl.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div>
        <div class="cart-item-name">${item.emoji} ${item.name}</div>
        <div class="cart-item-price">${item.price * item.qty} kr</div>
      </div>
      <div class="cart-item-qty">
        <button class="qty-btn" onclick="removeFromCart(${item.id})">−</button>
        <span>${item.qty}</span>
        <button class="qty-btn" onclick="addToCart(${item.id})">+</button>
      </div>
    </div>
  `).join('');
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-sidebar').classList.add('open');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-sidebar').classList.remove('open');
}

async function placeOrder() {
  if (cart.length === 0) { showToast('Handlekurven er tom!'); return; }
  const name = document.getElementById('customer-name').value;
  const phone = document.getElementById('customer-phone').value;
  const address = document.getElementById('customer-address').value;
  if (!name || !phone || !address) { showToast('Fyll inn alle felt!'); return; }

  const order = {
    customer_name: name,
    customer_phone: phone,
    customer_address: address,
    items: cart.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
    total: cart.reduce((sum, i) => sum + i.price * i.qty, 0)
  };

  try {
    const res = await fetch(`${API}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(order)
    });
    if (res.ok) {
      cart = [];
      updateCartUI();
      closeCart();
      document.getElementById('customer-name').value = '';
      document.getElementById('customer-phone').value = '';
      document.getElementById('customer-address').value = '';
      showToast('✅ Bestilling mottatt! Takk ' + name);
      loadOrders();
    }
  } catch (e) {
    showToast('❌ Feil ved bestilling');
  }
}

async function loadOrders() {
  try {
    const res = await fetch(`${API}/orders`);
    const orders = await res.json();
    const grid = document.getElementById('orders-grid');
    if (orders.length === 0) {
      grid.innerHTML = '<p style="color:#555">Ingen bestillinger ennå.</p>';
      return;
    }
    grid.innerHTML = orders.slice().reverse().slice(0, 6).map(o => `
      <div class="order-card">
        <div class="order-card-header">
          <span class="order-id">#${o.id}</span>
          <span class="order-status">Bekreftet</span>
        </div>
        <div class="order-customer">👤 ${o.customer_name} — 📱 ${o.customer_phone}</div>
        <div class="order-items">${o.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</div>
        <div class="order-total">💰 ${o.total} kr</div>
      </div>
    `).join('');
  } catch (e) {
    console.log('Ingen orders ennå');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderMenu();
loadOrders();
setInterval(loadOrders, 10000);
</script>
</body>
</html>
